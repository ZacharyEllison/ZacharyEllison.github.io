name: Build CV PDF

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - main.tex
      - .github/workflows/build-cv-pdf.yml

permissions:
  contents: write

jobs:
  build-cv-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Compile main.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Publish compiled PDF as cv.pdf
        run: mv -f main.pdf cv.pdf

      - name: Commit updated PDF
        run: |
          if [[ -z "$(git status --porcelain -- cv.pdf)" ]]; then
            echo "cv.pdf is already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cv.pdf
          git commit -m "Update cv.pdf from main.tex"
          git push
